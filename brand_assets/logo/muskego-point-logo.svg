<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 72" width="220" height="72" role="img" aria-label="Muskego Point Resort">
  <title>Muskego Point Resort</title>
  <rect width="220" height="72" fill="#2F4A3C" rx="3"/>

  <!-- Left tree (behind center) -->
  <g fill="#F4F0E8" opacity="0.68" transform="translate(14,8)">
    <polygon points="7,7 4,13 10,13"/>
    <polygon points="7,10 3,18 11,18"/>
    <polygon points="7,14 2,23 12,23"/>
    <rect x="6.2" y="21" width="1.6" height="5"/>
  </g>

  <!-- Right tree (behind center) -->
  <g fill="#F4F0E8" opacity="0.68" transform="translate(14,8)">
    <polygon points="23,7 20,13 26,13"/>
    <polygon points="23,10 19,18 27,18"/>
    <polygon points="23,14 18,23 28,23"/>
    <rect x="22.2" y="21" width="1.6" height="5"/>
  </g>

  <!-- Center tree (front, tallest) -->
  <g fill="#F4F0E8" transform="translate(14,8)">
    <polygon points="15,0 10.5,9 19.5,9"/>
    <polygon points="15,5 9,15 21,15"/>
    <polygon points="15,10 7,22 23,22"/>
    <rect x="14" y="20" width="2" height="6"/>
  </g>

  <!-- Wordmark text -->
  <text x="58" y="32" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="bold" fill="#F4F0E8" letter-spacing="-0.3">Muskego Point</text>
  <text x="60" y="47" font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="rgba(244,240,232,0.62)" letter-spacing="3.8">RESORT</text>
  <line x1="58" y1="53" x2="174" y2="53" stroke="rgba(244,240,232,0.18)" stroke-width="0.75"/>
</svg>
